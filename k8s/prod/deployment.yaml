apiVersion: v1
kind: Namespace
metadata:
  name: prod
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: devsecops-app
  namespace: prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devsecops-app
  template:
    metadata:
      labels:
        app: devsecops-app
    spec:
      containers:
        - name: devsecops-app
          image: devsecops-image:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: devsecops-app
  namespace: prod
spec:
  type: NodePort
  selector:
    app: devsecops-app
  ports:
    - port: 5000
      targetPort: 5000
      nodePort: 30081
