<!doctype html>
<html lang="fr" class="h-full">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login — Domain OSINT</title>
    <script>
      const stored = localStorage.getItem("theme");
      if (stored === "dark" || (!stored && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
        document.documentElement.classList.add("dark");
      }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      .bg-bluefield {
        background:
          linear-gradient(135deg, rgba(12,74,110,0.18), rgba(59,130,246,0.12)),
          radial-gradient(70rem 40rem at 20% 10%, rgba(37,99,235,0.55), transparent 60%),
          radial-gradient(55rem 35rem at 85% 25%, rgba(59,130,246,0.32), transparent 60%),
          radial-gradient(rgba(0,0,0,0.06) 1px, transparent 1px);
        background-size: auto, auto, auto, 18px 18px;
        background-attachment: fixed;
      }
      .dark .bg-bluefield {
        background:
          linear-gradient(135deg, rgba(2,6,23,1), rgba(3,7,18,1)),
          radial-gradient(70rem 40rem at 20% 10%, rgba(37,99,235,0.28), transparent 60%),
          radial-gradient(55rem 35rem at 85% 25%, rgba(59,130,246,0.18), transparent 60%),
          radial-gradient(rgba(255,255,255,0.06) 1px, transparent 1px);
        background-size: auto, auto, auto, 18px 18px;
        background-attachment: fixed;
      }
      .glass {
        background: rgba(255, 255, 255, 0.75);
        border: 1px solid rgba(148, 163, 184, 0.35);
        box-shadow: 0 22px 60px rgba(15, 23, 42, 0.14);
        backdrop-filter: blur(14px);
      }
      .dark .glass {
        background: rgba(2, 6, 23, 0.65);
        border: 1px solid rgba(148, 163, 184, 0.18);
        box-shadow: 0 22px 60px rgba(0, 0, 0, 0.50);
      }
      .btn-primary {
        background: linear-gradient(135deg, #2563eb 0%, #3b82f6 50%, #6366f1 100%);
      }
    </style>
  </head>
  <body class="h-full bg-white text-slate-900 dark:bg-slate-950 dark:text-slate-50">
    <div class="min-h-full bg-bluefield">
      <div class="mx-auto flex min-h-full max-w-md items-center px-4 py-10">
        <div class="w-full rounded-2xl p-6 glass">
          <div class="flex items-center justify-between gap-3">
            <div>
              <div class="text-xs font-semibold text-slate-600 dark:text-slate-300">Accès protégé</div>
              <h1 class="mt-1 text-2xl font-semibold tracking-tight">Connexion</h1>
            </div>
            <button
              type="button"
              class="rounded-xl border border-slate-200 bg-white/70 px-3 py-2 text-sm font-medium shadow-sm backdrop-blur hover:bg-white dark:border-slate-800 dark:bg-slate-950/60 dark:hover:bg-slate-900"
              onclick="
                const root=document.documentElement;
                root.classList.toggle('dark');
                localStorage.setItem('theme', root.classList.contains('dark') ? 'dark' : 'light');
              "
            >
              Thème
            </button>
          </div>

          {% if error %}
            <div class="mt-4 rounded-xl border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-800 dark:border-red-900/60 dark:bg-red-950/40 dark:text-red-200">
              {{ error }}
            </div>
          {% endif %}

          <form action="/login" method="post" class="mt-6 space-y-4">
            <div>
              <label class="block text-sm font-medium">Utilisateur</label>
              <input
                name="username"
                required
                class="mt-2 w-full rounded-2xl border border-slate-200 bg-white/80 px-4 py-3 text-sm outline-none focus:border-blue-400 focus:ring-4 focus:ring-blue-100 dark:border-slate-800 dark:bg-slate-950/70 dark:focus:border-blue-400 dark:focus:ring-blue-950/60"
              />
            </div>
            <div>
              <label class="block text-sm font-medium">Mot de passe</label>
              <input
                name="password"
                type="password"
                required
                class="mt-2 w-full rounded-2xl border border-slate-200 bg-white/80 px-4 py-3 text-sm outline-none focus:border-blue-400 focus:ring-4 focus:ring-blue-100 dark:border-slate-800 dark:bg-slate-950/70 dark:focus:border-blue-400 dark:focus:ring-blue-950/60"
              />
            </div>
            <button type="submit" class="btn-primary w-full rounded-2xl px-5 py-3 text-sm font-semibold text-white shadow-lg shadow-blue-500/20 ring-1 ring-white/10">
              Se connecter
            </button>
          </form>

          <p class="mt-4 text-xs text-slate-600 dark:text-slate-300">
            Identifiants configurables via `APP_USERNAME` / `APP_PASSWORD`.
          </p>
        </div>
      </div>
    </div>
  </body>
</html>
